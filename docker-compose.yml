services:
  mysql:
    image: mysql:8.0
    container_name: grok-gateway-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: grok_gateway
      MYSQL_USER: grok
      MYSQL_PASSWORD: grok
    ports:
      - '3307:3306'
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - grok_gateway_mysql_data:/var/lib/mysql
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', '127.0.0.1', '-ugrok', '-pgrok']
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  grok_gateway_mysql_data:
